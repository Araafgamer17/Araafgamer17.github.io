<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARAAFGAMER17 // OS</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --cyber-blue: #00f0ff;
            --dark-bg: #020202;
            --ui-border: rgba(0, 255, 65, 0.3);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            height: 100%; width: 100%;
            overflow: hidden;
        }

        /* Matrix Rain Backdrop */
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        /* CRT Overlay */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 3px; pointer-events: none; z-index: 10;
        }

        .container {
            max-width: 600px; margin: 0 auto; padding: 40px 20px;
            display: flex; flex-direction: column; height: 100vh;
            justify-content: center; box-sizing: border-box;
        }

        .terminal-header {
            border: 1px solid var(--ui-border);
            padding: 20px;
            background: rgba(0, 10, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            margin-bottom: 40px;
            text-align: center;
        }

        h1 { font-size: 2rem; letter-spacing: 8px; margin: 0; text-shadow: 0 0 10px var(--neon-green); }
        .status { font-size: 10px; color: #888; margin-top: 5px; }

        /* Big System Buttons */
        .system-links {
            display: flex; flex-direction: column; gap: 20px;
        }

        .big-btn {
            text-decoration: none;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            border: 2px solid;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.6);
        }

        .btn-green {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.1);
        }

        .btn-green:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 30px var(--neon-green);
        }

        .btn-blue {
            border-color: var(--cyber-blue);
            color: var(--cyber-blue);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .btn-blue:hover {
            background: var(--cyber-blue);
            color: #000;
            box-shadow: 0 0 30px var(--cyber-blue);
        }

        footer {
            margin-top: auto;
            text-align: center;
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.5;
            padding-top: 20px;
        }

        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>
    <div class="overlay"></div>

    <div class="container">
        <header class="terminal-header">
            <h1>AG17_V-OS</h1>
            <div class="status">ENCRYPTION: AES-256 // USER: ROOT_ARAAF</div>
        </header>

        <nav class="system-links">
            <a href="cmd.html" class="big-btn btn-green">
                [ RUN_SYSTEM_CMD ]
            </a>

            <a href="EaglercraftX_1.8_WASM-GC_Offline_Download.html" class="big-btn btn-blue">
                [ EXECUTE_EAGLERCRAFT ]
            </a>
        </nav>

        <footer>
            CONNECTION_STABLE // SYSTEM_TIME: <span id="clock">00:00:00</span> <span class="blink">_</span>
        </footer>
    </div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "0101010101010101010101";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff41";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 40);

        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
