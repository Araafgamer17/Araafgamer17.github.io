<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARAAFGAMER17 // TERMINAL</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #050505;
            --ui-border: rgba(0, 255, 65, 0.3);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        #matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px; pointer-events: none; z-index: 10;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 30px 15px; text-align: center; }

        .terminal-header {
            border: 1px solid var(--ui-border);
            padding: 20px;
            background: rgba(0, 10, 0, 0.8);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);
            margin-bottom: 30px;
        }

        h1 { font-size: 2.5rem; letter-spacing: 5px; margin: 10px 0; text-shadow: 0 0 8px var(--neon-green); }

        .nav-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;
        }

        .btn {
            text-decoration: none; color: var(--neon-green); border: 1px solid var(--neon-green);
            padding: 10px; font-weight: bold; background: rgba(0, 20, 0, 0.5);
        }

        .btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .video-module {
            border: 1px solid var(--ui-border);
            padding: 10px;
            background: #000;
            position: relative;
        }

        .video-module::before {
            content: "SECURE_STREAM_LN";
            position: absolute; top: -10px; left: 10px;
            background: var(--dark-bg); padding: 0 5px; font-size: 10px;
        }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        footer { margin-top: 50px; font-size: 12px; opacity: 0.6; padding-bottom: 20px; }
        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>
    <div class="overlay"></div>

    <div class="container">
        <header class="terminal-header">
            <div style="font-size: 11px;">SYSTEM_STATUS: ACTIVE // USER: ARAAFGAMER17</div>
            <h1>ARAAFGAMER17</h1>
            <p>> CONTENT_STREAMING_NODE</p>
        </header>

        <div class="nav-grid">
            <a href="https://youtube.com/@araafgamer17" class="btn" target="_blank">[ YT_CHANNEL ]</a>
            <a href="https://github.com/Araafgamer17" class="btn" target="_blank">[ GIT_REPOS ]</a>
        </div>

        <div class="video-grid">
            <!-- Video 1 -->
            <div class="video-module">
                <p style="text-align: left; margin: 5px 0; font-size: 12px;">// DATA_PACKET_01.mp4</p>
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/fHZbiWXimeI" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>

            <!-- Video 2 -->
            <div class="video-module">
                <p style="text-align: left; margin: 5px 0; font-size: 12px;">// DATA_PACKET_02.mp4</p>
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/vxf8md5blAA" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <footer>
            TERMINAL_BOOT_SUCCESSFUL // © 2026 // <span id="clock">00:00:00</span> <span class="cursor">_</span>
        </footer>
    </div>

    <script>
        // Matrix Rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "0101010101010101010101";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff41";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 40);

        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
