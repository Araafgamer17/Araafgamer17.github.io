<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server | Info</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .server-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .server-banner {
            width: 100%;
            height: 200px;
            background: #21262d;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #30363d;
        }
        .server-banner img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }
        .content { padding: 25px; }
        h1 { color: #58a6ff; margin-top: 0; }
        .ip-box {
            background: #0d1117;
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed #238636;
            color: #3fb950;
            font-family: monospace;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        .rules-list {
            padding-left: 20px;
            color: #8b949e;
        }
        .rules-list li { margin-bottom: 8px; }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="server-card">
        <div class="server-banner">
            <img src="server-icon.png" alt="Server Picture">
        </div>

        <div class="content">
            <h1>MC Server 1.12.2</h1>
            
            <div class="ip-box">
                IP: Coming soom...
            </div>

            <h3>📜 Server Rules</h3>
            <ul class="rules-list">
                <li>No griefing or stealing.</li>
                <li>Respect all players in the chat.</li>
                <li>No hacking or unfair client mods.</li>
                <li>Have fun and build together!</li>
            </ul>

            <h3>ℹ️ Details</h3>
            <p style="font-size: 0.9rem; color: #8b949e;">
                Version: 1.12.2 <br>
                Type: Survival
            </p>

            <a href="../index.html" class="back-btn">← Back to Hub</a>
        </div>
    </div>

</body>
</html>
