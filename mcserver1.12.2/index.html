<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server | Info</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .server-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .server-banner {
            width: 100%;
            height: 180px;
            background: #21262d;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #30363d;
        }
        .server-banner img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }
        .content { padding: 25px; }
        h1 { color: #58a6ff; margin: 0 0 15px 0; font-size: 1.5rem; }
        
        .ip-box {
            background: #0d1117;
            padding: 12px;
            border-radius: 6px;
            border: 1px dashed #238636;
            color: #3fb950;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        #status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .rules-list { padding-left: 20px; color: #8b949e; font-size: 0.95rem; }
        .rules-list li { margin-bottom: 8px; }
        
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .admin-zone {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #30363d;
            text-align: center;
        }
        .owner-btn {
            background-color: #21262d;
            color: #8b949e;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-block;
            transition: 0.2s;
        }
        .owner-btn:hover {
            background-color: #30363d;
            color: #58a6ff;
            border-color: #58a6ff;
        }
    </style>
</head>
<body>

    <div class="server-card">
        <div class="server-banner">
            <img src="server-icon.png" alt="Server Image">
        </div>

        <div class="content">
            <h1>MC Server 1.12.2</h1>
            
            <div class="ip-box">IP: Coming soon...</div>
            
            <div style="text-align: center;">
                <span id="status-badge">Checking...</span>
            </div>

            <h3>📜 Server Rules</h3>
            <ul class="rules-list">
                <li>No griefing or stealing.</li>
                <li>Respect all players.</li>
                <li>No hacking/cheating.</li>
            </ul>

            <a href="../index.html" class="back-btn">← Back to Hub</a>

            <div class="admin-zone">
                <a href="https://github.com/Araafgamer17/Araafgamer17.github.io/edit/main/mcserver1.12.2/index.html" 
                   class="owner-btn" target="_blank">
                    ⚙️ OPEN OWNER CONSOLE
                </a>
            </div>
        </div>

        <div id="status-display" style="display:none;">SERVER_STATUS: no</div>
    </div>

    <script>
        const statusText = document.getElementById('status-display').innerText;
        const badge = document.getElementById('status-badge');

        if (statusText.includes('yes')) {
            badge.innerText = "● ONLINE";
            badge.style.background = "#238636";
            badge.style.color = "white";
        } else {
            badge.innerText = "○ OFFLINE";
            badge.style.background = "#da3633";
            badge.style.color = "white";
        }
    </script>
</body>
</html>
