<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server | Info</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .server-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .server-banner {
            width: 100%;
            height: 200px;
            background: #21262d;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #30363d;
        }
        .server-banner img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }
        .content { padding: 25px; }
        h1 { color: #58a6ff; margin-top: 0; }
        .ip-box {
            background: #0d1117;
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed #238636;
            color: #3fb950;
            font-family: monospace;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        .status-container {
            text-align: center;
            margin-bottom: 20px;
        }
        #status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .rules-list {
            padding-left: 20px;
            color: #8b949e;
        }
        .rules-list li { margin-bottom: 8px; }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-btn:hover { text-decoration: underline; }

        /* Admin/Owner Section */
        .admin-zone {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #30363d;
            text-align: center;
        }
        .owner-btn {
            background-color: #21262d;
            color: #8b949e;
            border: 1px solid #30363d;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            text-decoration: none;
            display: inline-block;
        }
        .owner-btn:hover {
            background-color: #30363d;
            color: #58a6ff;
        }
    </style>
</head>
<body>

    <div class="server-card">
        <div class="server-banner">
            <img src="server-icon.png" alt="Server Picture">
        </div>

        <div class="content">
            <h1>MC Server 1.12.2</h1>
            
            <div class="ip-box">
                IP: Coming soon...
            </div>

            <div class="status-container">
                <span id="status-badge">Checking...</span>
            </div>

            <h3>📜 Server Rules</h3>
            <ul class="rules-list">
                <li>No griefing or stealing.</li>
                <li>Respect all players in the chat.</li>
                <li>No hacking or unfair client mods.</li>
                <li>Have fun and build together!</li>
            </ul>

            <h3>ℹ️ Details</h3>
            <p style="font-size: 0.9rem; color: #8b949e;">
                Version: 1.12.2 <br>
                Type: Survival
            </p>

            <a href="../index.html" class="back-btn">← Back to Hub</a>

            <div class="admin-zone">
                <a href="https://github.com/Araafgamer17/Araafgamer17.github.io/edit/main/mcserver1.12.2/index.html" 
                   class="owner-btn" 
                   target="_blank">
                    ⚙️ Owner Login (Edit Status)
                </a>
            </div>
        </div>

        <div id="status-display" style="display:none;">yes</div>
    </div>

    <script>
        // Update the badge colors based on the switch
        const statusVal = document.getElementById('status-display').innerText.trim();
        const badge = document.getElementById('status-badge');
        
        if (statusVal === 'yes') {
            badge.innerText = "● Online";
            badge.style.background = "#238636";
            badge.style.color = "#ffffff";
        } else {
            badge.innerText = "○ Offline";
            badge.style.background = "#da3633";
            badge.style.color = "#ffffff";
        }
    </script>
</body>
</html>
